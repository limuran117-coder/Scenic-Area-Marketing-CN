<text x="70" y="772" class="body">铁律：每张卡片≤5个表格，超出拆成多张</text>
<text x="70" y="788" class="body">换行：用`<br/>`替代`\n`（飞书卡片规范）</text>
<text x="256" y="820" text-anchor="middle" class="small" fill="#b45309">⚠️ 912530铁律：5章结构</text>

<!-- Step 2: 私信确认 -->
<rect x="476" y="654" width="360" height="178" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
<rect x="476" y="654" width="360" height="22" rx="8" fill="#fef3c7"/>
<text x="656" y="668" text-anchor="middle" class="head" fill="#b45309">Step 2 · 私信确认机制</text>
<text x="490" y="696" class="body">时机：每张卡片发群前先私信站长</text>
<text x="490" y="714" class="body">内容：「周报已生成，请确认格式」</text>
<text x="490" y="732" class="body">等待：站长回复「对」「可以」</text>
<text x="490" y="750" class="body">触发：确认成功 → 写入MEMORY.md</text>
<text x="490" y="772" class="body">如站长说「不对」→ 立即纠错 → 重新生成</text>
<text x="490" y="788" class="body">⚠️ 未确认不直接发群！</text>
<text x="656" y="820" text-anchor="middle" class="small" fill="#b45309">反馈闭环：确认成功也要记录</text>

