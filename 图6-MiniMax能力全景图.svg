<text x="136" y="408" text-anchor="middle" class="metric" fill="#dc2626">—</text>
<text x="136" y="423" text-anchor="middle" class="unit">不可用</text>

<rect x="236" y="368" width="128" height="60" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1"/>
<text x="300" y="388" text-anchor="middle" class="head" fill="#dc2626">原因</text>
<text x="300" y="408" text-anchor="middle" class="body">需Max计划</text>
<text x="300" y="423" text-anchor="middle" class="unit">当前Token Plan</text>

<text x="56" y="448" class="body">命令：mmx video "提示词"</text>
<text x="56" y="462" class="body">Hailuo-2.3 模型（需要Max升级）</text>
<text x="56" y="476" class="body">用途：景区宣传片 / 短视频</text>

<rect x="56" y="490" width="308" height="22" rx="4" fill="#fef2f2"/>
<text x="210" y="505" text-anchor="middle" class="badge" fill="#dc2626">❌ 不可用 · 需Max计划升级</text>

