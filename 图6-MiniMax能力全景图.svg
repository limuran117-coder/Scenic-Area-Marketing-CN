<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  .title { font-size: 20px; font-weight: 700; fill: #111827; }
  .subtitle { font-size: 11px; fill: #6b7280; }
  .section { font-size: 13px; font-weight: 700; }
  .card-title { font-size: 12px; font-weight: 600; }
  .body { font-size: 9px; fill: #4b5563; }
  .small { font-size: 8px; fill: #9ca3af; }
  .done { font-size: 10px; font-weight: 600; }
  .badge { font-size: 9px; font-weight: 600; }
  .head { font-size: 11px; font-weight: 600; }
  .metric { font-size: 16px; font-weight: 700; }
  .unit { font-size: 10px; fill: #6b7280; }
</style>
<defs>
  <marker id="d1" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#2563eb"/></marker>
  <marker id="d2" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#16a34a"/></marker>
  <marker id="d3" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#9333ea"/></marker>
  <marker id="d4" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#dc2626"/></marker>
</defs>
<rect width="1200" height="600" fill="#fafbfc"/>

<!-- ===== TITLE ===== -->
<text x="600" y="28" text-anchor="middle" class="title">MiniMax CLI 能力全景图</text>
<text x="600" y="46" text-anchor="middle" class="subtitle">mmx 命令行工具 · 6种能力 · 限制与现状 · 2026-04-27</text>

<!-- ===== CAPABILITY: IMAGE ===== -->
<rect x="40" y="64" width="340" height="240" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<rect x="40" y="64" width="340" height="34" rx="10" fill="#fef2f2"/>
<rect x="40" y="86" width="340" height="12" fill="#fef2f2"/>
<text x="60" y="84" class="section" fill="#dc2626">🖼 image · 图像生成</text>

<rect x="56" y="108" width="150" height="70" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
<text x="131" y="130" text-anchor="middle" class="head" fill="#c2410c">本周剩余</text>
<text x="131" y="155" text-anchor="middle" class="metric" fill="#c2410c">49</text>
<text x="131" y="172" text-anchor="middle" class="unit">/ 50张</text>

<rect x="226" y="108" width="138" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
<text x="295" y="130" text-anchor="middle" class="head" fill="#dc2626">已使用</text>
<text x="295" y="155" text-anchor="middle" class="metric" fill="#dc2626">1</text>
<text x="295" y="172" text-anchor="middle" class="unit">张</text>

<text x="56" y="192" class="body">命令：mmx image "提示词"</text>
<text x="56" y="206" class="body">输出：image_001.jpg</text>
<text x="56" y="220" class="body">用途：营销海报 / 五一预热图</text>
<text x="56" y="234" class="body">模型：image-01</text>
<text x="56" y="248" class="body">比例：1:1 / 16:9 / 9:16 等</text>
<text x="56" y="262" class="body">分辨率：1K / 2K / 4K</text>

<rect x="56" y="274" width="308" height="22" rx="4" fill="#dcfce7"/>
<text x="210" y="289" text-anchor="middle" class="done" fill="#16a34a">✅ 正常工作 · 已验证可用</text>

<!-- ===== CAPABILITY: SPEECH ===== -->
<rect x="400" y="64" width="340" height="240" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<rect x="400" y="64" width="340" height="34" rx="10" fill="#f0fdf4"/>
<rect x="400" y="86" width="340" height="12" fill="#f0fdf4"/>
<text x="420" y="84" class="section" fill="#16a34a">🎙 speech · 语音合成</text>

<rect x="416" y="108" width="150" height="70" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
<text x="491" y="130" text-anchor="middle" class="head" fill="#c2410c">本周剩余</text>
<text x="491" y="155" text-anchor="middle" class="metric" fill="#c2410c">3,920</text>
<text x="491" y="172" text-anchor="middle" class="unit">/ 4,000张</text>

<rect x="586" y="108" width="138" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
<text x="655" y="130" text-anchor="middle" class="head" fill="#dc2626">已使用</text>
<text x="655" y="155" text-anchor="middle" class="metric" fill="#dc2626">80</text>
<text x="655" y="172" text-anchor="middle" class="unit">张</text>

<text x="416" y="192" class="body">命令：mmx speech "文本"</text>
<text x="416" y="206" class="body">输出：synthesized audio</text>
<text x="416" y="220" class="body">用途：广播词 / 宣传语 / 导游词</text>
<text x="416" y="234" class="body">模型：speech-2.8-hd</text>
<text x="416" y="248" class="body">格式：mp3 / wav</text>

<rect x="416" y="274" width="308" height="22" rx="4" fill="#dcfce7"/>
<text x="570" y="289" text-anchor="middle" class="done" fill="#16a34a">✅ 正常工作 · 已验证可用</text>

<!-- ===== CAPABILITY: MUSIC ===== -->
<rect x="760" y="64" width="360" height="240" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<rect x="760" y="64" width="360" height="34" rx="10" fill="#f5f3ff"/>
<rect x="760" y="86" width="360" height="12" fill="#f5f3ff"/>
<text x="780" y="84" class="section" fill="#7c3aed">🎵 music · 音乐生成</text>

<rect x="776" y="108" width="160" height="70" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
<text x="856" y="130" text-anchor="middle" class="head" fill="#7c3aed">本周剩余</text>
<text x="856" y="155" text-anchor="middle" class="metric" fill="#7c3aed">—</text>
<text x="856" y="172" text-anchor="middle" class="unit">额度未知</text>

<rect x="956" y="108" width="148" height="70" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
<text x="1030" y="130" text-anchor="middle" class="head" fill="#7c3aed">状态</text>
<text x="1030" y="155" text-anchor="middle" class="metric" fill="#7c3aed">⚠️</text>
<text x="1030" y="172" text-anchor="middle" class="unit">需特殊参数</text>

<text x="776" y="192" class="body">命令：mmx music --lyrics "歌词" "风格"</text>
<text x="776" y="206" class="body">或：mmx music --instrumental "风格"</text>
<text x="776" y="220" class="body">⚠ 不能纯提示词，必须加参数</text>
<text x="776" y="234" class="body">用途：BGM / 口号音乐 / 景区主题曲</text>
<text x="776" y="248" class="body">格式：mp3 / wav</text>

<rect x="776" y="274" width="328" height="22" rx="4" fill="#fef3c7"/>
<text x="940" y="289" text-anchor="middle" class="badge" fill="#b45309">⚠ 需--lyrics或--instrumental参数</text>

<!-- ===== CAPABILITY: VIDEO ===== -->
<rect x="40" y="320" width="340" height="200" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
