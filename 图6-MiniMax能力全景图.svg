<text x="491" y="410" text-anchor="middle" class="metric" fill="#c2410c">~140</text>
<text x="491" y="425" text-anchor="middle" class="unit">/ 150次</text>

<rect x="586" y="368" width="138" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
<text x="655" y="388" text-anchor="middle" class="head" fill="#16a34a">已使用</text>
<text x="655" y="410" text-anchor="middle" class="metric" fill="#16a34a">~10</text>
<text x="655" y="425" text-anchor="middle" class="unit">次（估算）</text>

<text x="416" y="448" class="body">命令：mmx search "查询内容"</text>
<text x="416" y="462" class="body">输出：搜索结果摘要</text>
<text x="416" y="476" class="body">用途：行业信息 / 竞品动态 / 文旅政策</text>

<rect x="416" y="490" width="308" height="22" rx="4" fill="#dcfce7"/>
<text x="570" y="505" text-anchor="middle" class="done" fill="#16a34a">✅ 正常工作 · 够用</text>

