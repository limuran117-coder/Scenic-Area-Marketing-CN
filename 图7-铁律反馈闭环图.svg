<!-- ===== TITLE ===== -->
<text x="600" y="30" text-anchor="middle" class="title">铁律反馈闭环 · 从纠错到系统升级</text>
<text x="600" y="48" text-anchor="middle" class="subtitle">MEMORY.md铁律机制 · Cron/SOP同步修复 · Feedback Loop · 2026-04-28</text>

<!-- ===== LEFT SIDE: NEGATIVE FEEDBACK (纠错) ===== -->
<rect x="30" y="64" width="340" height="560" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<rect x="30" y="64" width="340" height="36" rx="12" fill="#fef2f2"/>
<text x="200" y="85" text-anchor="middle" class="section" fill="#dc2626">❌ 负向反馈 · 纠错闭环</text>

<!-- Step 1: 站长发出纠错信号 -->
<rect x="46" y="112" width="308" height="88" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
<rect x="46" y="112" width="308" height="26" rx="8" fill="#fee2e2"/>
<text x="200" y="130" text-anchor="middle" class="step-head" fill="#dc2626">Step 1 · 站长发出纠错信号</text>
<text x="60" y="154" class="body">触发词：「不对」「停止」「不要」</text>
<text x="60" y="168" class="body">场景：AI执行结果与预期不符</text>
<text x="60" y="182" class="body">示例：抖音指数表格格式有误</text>

<!-- Step 2: MEMORY.md写入feedback -->
<rect x="46" y="214" width="308" height="90" rx="8" fill="#ffe4e6" stroke="#f87171" stroke-width="1.5"/>
<rect x="46" y="214" width="308" height="26" rx="8" fill="#ffe4e6"/>
<text x="200" y="232" text-anchor="middle" class="step-head" fill="#dc2626">Step 2 · MEMORY.md 写入铁律</text>
<text x="60" y="256" class="body">创建 [feedback] 分类 entry</text>
<text x="60" y="270" class="body">格式：**规则：** / **Why：**</text>
<text x="60" y="284" class="body">标记：[feedback] · update_time</text>

<!-- Example Case -->
<rect x="46" y="318" width="308" height="70" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
<text x="60" y="338" class="head" fill="#c2410c">📝 案例：announce修复（04-26）</text>
<text x="60" y="356" class="body">问题：announce模式推完整输出到群</text>
<text x="60" y="370" class="body">修复：cron jobs.json announce→none</text>
<text x="60" y="384" class="body">影响：6个cron不再发过程消息</text>

<!-- Step 3: SOP/cron同步 -->
<rect x="46" y="402" width="308" height="90" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
<rect x="46" y="402" width="308" height="26" rx="8" fill="#fef3c7"/>
<text x="200" y="420" text-anchor="middle" class="step-head" fill="#b45309">Step 3 · SOP / Cron 同步修复</text>
<text x="60" y="444" class="body">① 找到对应的 SOP 文件</text>
<text x="60" y="458" class="body">② 更新 cron prompt 章节结构</text>
<text x="60" y="472" class="body">③ 验证：下次执行按新规则运行</text>

<!-- 闭环完成 -->
<rect x="46" y="506" width="308" height="56" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
<text x="200" y="524" text-anchor="middle" class="head" fill="#166534">✅ 闭环完成标志</text>
<text x="60" y="542" class="body">MEMORY.md记录 · SOP已更新 · Cron已同步</text>
<text x="60" y="558" class="body">下次同类任务 → 新铁律自动生效</text>

