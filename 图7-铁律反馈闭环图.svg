<!-- ===== TITLE ===== -->
<text x="600" y="28" text-anchor="middle" class="title">铁律反馈闭环 · 从纠错到系统升级</text>
<text x="600" y="46" text-anchor="middle" class="subtitle">MEMORY.md铁律机制 · Cron/SOP同步修复 · Feedback Loop · 2026-04-27</text>

<!-- ===== LEFT SIDE: NEGATIVE FEEDBACK (纠错) ===== -->
<rect x="30" y="64" width="340" height="540" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<rect x="30" y="64" width="340" height="34" rx="10" fill="#fef2f2"/>
<rect x="30" y="86" width="340" height="12" fill="#fef2f2"/>
<text x="50" y="84" class="section" fill="#dc2626">❌ 负向反馈 · 纠错闭环</text>

<!-- Step: 站长说"不对/停止" -->
<rect x="46" y="108" width="308" height="80" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
<rect x="46" y="108" width="308" height="22" rx="8" fill="#fee2e2"/>
<text x="200" y="124" text-anchor="middle" class="step-head" fill="#dc2626">Step 1 · 站长发出纠错信号</text>
<text x="60" y="148" class="body">触发词：「不对」「停止」「不要」「从来不行」</text>
<text x="60" y="162" class="body">场景：AI执行结果与预期不符</text>
<text x="60" y="176" class="body">示例：「抖音指数卡片的表格格式错了」「不要用表格」</text>

<!-- Step: MEMORY.md写入feedback -->
<rect x="46" y="202" width="308" height="80" rx="8" fill="#ffe4e6" stroke="#f87171" stroke-width="1.5"/>
<rect x="46" y="202" width="308" height="22" rx="8" fill="#ffe4e6"/>
<text x="200" y="218" text-anchor="middle" class="step-head" fill="#dc2626">Step 2 · MEMORY.md 写入铁律</text>
<text x="60" y="242" class="body">在MEMORY.md创建 [feedback] 分类的 entry</text>
<text x="60" y="256" class="body">格式：**规则：** / **Why：** / **How to apply：**</text>
<text x="60" y="270" class="body">标记：[feedback] 分类 · update_time → 今天日期</text>

<!-- Example: announce修复案例 -->
<rect x="46" y="296" width="308" height="60" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
<text x="60" y="316" class="head" fill="#c2410c">📝 实际案例（04-26修复）</text>
<text x="60" y="332" class="body">问题：announce模式把agent完整文字推到群里</text>
<text x="60" y="346" class="body">修复：cron jobs.json announce → none（6个cron）</text>

<!-- Step: SOP/cron同步 -->
<rect x="46" y="370" width="308" height="80" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
<rect x="46" y="370" width="308" height="22" rounded="8" fill="#fef3c7"/>
<text x="200" y="386" text-anchor="middle" class="step-head" fill="#b45309">Step 3 · SOP / Cron 同步修复</text>
<text x="60" y="406" class="body">① 找到对应的 SOP 文件</text>
<text x="60" y="420" class="body">② 更新 cron prompt 中的章节结构</text>
<text x="60" y="434" class="body">③ 验证：下次执行是否按新规则运行</text>

<!-- Step: 验证完成 -->
<rect x="46" y="464" width="308" height="60" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
<text x="200" y="484" text-anchor="middle" class="head" fill="#166534">✅ 闭环完成标志</text>
<text x="60" y="504" class="body">MEMORY.md 有记录 · SOP 已更新 · Cron 已同步</text>
<text x="60" y="518" class="body">下次同类任务 → 新铁律自动生效</text>

