<text x="675" y="262" text-anchor="middle" class="body" fill="#cbd5e1">2026-04-28</text>

<!-- [feedback] section -->
<rect x="456" y="290" width="288" height="70" rx="6" fill="#334155" stroke="#dc2626" stroke-width="1"/>
<text x="470" y="308" class="badge" fill="#f87171">[feedback] 最新确认</text>
<text x="470" y="324" class="body" fill="#cbd5e1">announce模式→none（6个cron）</text>
<text x="470" y="338" class="body" fill="#cbd5e1">飞书卡片换行用`<br/>`替代`\n`</text>
<text x="470" y="352" class="body" fill="#cbd5e1">搜索铁律：只用「建业电影小镇」+7个竞品</text>

<!-- [user] section -->
<rect x="456" y="372" width="288" height="50" rx="6" fill="#334155" stroke="#2563eb" stroke-width="1"/>
<text x="470" y="390" class="badge" fill="#60a5fa">[user]</text>
<text x="470" y="406" class="body" fill="#cbd5e1">年度客流153万 / 营收1.12亿 / YTD 525,533</text>

<!-- [project] section -->
