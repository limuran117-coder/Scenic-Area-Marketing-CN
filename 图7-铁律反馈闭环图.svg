<line x1="370" y1="320" x2="430" y2="320" stroke="#dc2626" stroke-width="2" marker-end="url(#f1)"/>
<text x="400" y="312" text-anchor="middle" class="small" fill="#dc2626">纠错</text>

<!-- ===== CENTER: MEMORY.md CORE ===== -->
