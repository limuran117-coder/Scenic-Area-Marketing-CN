<rect x="440" y="180" width="320" height="34" rx="12" fill="#1e293b"/>
<text x="600" y="198" text-anchor="middle" class="section" fill="#f8fafc">MEMORY.md 铁律中枢</text>
<text x="600" y="215" text-anchor="middle" class="small" fill="#94a3b8">长期记忆 · 决策依据 · 跨session连续性</text>

<!-- Role -->
