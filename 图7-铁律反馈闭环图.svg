<text x="470" y="324" class="body" fill="#cbd5e1">announce模式→none（6个cron）</text>
<text x="470" y="340" class="body" fill="#cbd5e1">飞书卡片换行用`<br/>`替代`\n`</text>
<text x="470" y="356" class="body" fill="#cbd5e1">搜索铁律：只用竞品词</text>

