<text x="560" y="450" class="body" fill="#cbd5e1">W17完成 / SOP体系修复 / 竞品10/21</text>

<!-- [reference] section -->
<rect x="456" y="452" width="288" height="24" rx="4" fill="#334155"/>
<text x="470" y="468" class="badge" fill="#a78bfa">[reference]</text>
<text x="560" y="468" class="body" fill="#cbd5e1">飞书群oc_2581 / CDP 18800 / CSV路径</text>

